services:
  test.laravel:
    build:
      context: .
      dockerfile: Dockerfile
    image: test.laravel
    container_name: test.laravel
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      WWWUSER: "${WWWUSER:-1000}"
      LARAVEL_SAIL: 1
    volumes:
      - .:/var/www
    networks:
      - test-network
    depends_on:
      rabbitmq:
        condition: service_started
      elasticsearch:
        condition: service_healthy

  test-db:
    image: postgres:16-alpine
    container_name: test-db
    restart: always
    environment:
      POSTGRES_DB: test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - test-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  test-redis:
    image: redis:alpine
    container_name: test-redis
    restart: always
    command: redis-server --save "" --appendonly no
    networks:
      - test-network

  # workers
  queue-worker-products:
    image: test.laravel
    container_name: test-queue-worker-products
    restart: unless-stopped
    command: >
      php artisan queue:work rabbitmq
      --queue=products
      --sleep=${QUEUE_WORKER_SLEEP:-3}
      --timeout=${QUEUE_WORKER_PRODUCTS_TIMEOUT:-60}
      --max-jobs=1000
      --max-time=${QUEUE_WORKER_MAX_TIME:-3600}
    volumes:
      - .:/var/www
    networks:
      - test-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      test-db:
        condition: service_healthy

  queue-worker-orders:
    image: test.laravel
    container_name: test-queue-worker-orders
    restart: unless-stopped
    command: >
      php artisan queue:work rabbitmq
      --queue=orders
      --sleep=${QUEUE_WORKER_SLEEP:-3}
      --timeout=${QUEUE_WORKER_ORDERS_TIMEOUT:-60}
      --max-jobs=1000
      --max-time=${QUEUE_WORKER_MAX_TIME:-3600}
    volumes:
      - .:/var/www
    networks:
      - test-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      test-db:
        condition: service_healthy

  queue-worker-reindex:
    image: test.laravel
    container_name: test-queue-worker-reindex
    restart: unless-stopped
    command: >
      php artisan queue:work rabbitmq
      --queue=reindex
      --sleep=${QUEUE_WORKER_SLEEP:-3}
      --timeout=${QUEUE_WORKER_REINDEX_TIMEOUT:-120}
      --max-jobs=500
      --max-time=${QUEUE_WORKER_MAX_TIME:-3600}
    volumes:
      - .:/var/www
    networks:
      - test-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      test-db:
        condition: service_healthy

networks:
  test-network:
    driver: bridge

volumes:
  elasticsearch_data: